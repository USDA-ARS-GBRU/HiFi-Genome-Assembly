name: validate-helpers

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python helpers
        run: python -m py_compile scripts/*.py
      - name: Validate sbatch shell syntax
        run: bash -n 01_sbatch_templates/*.sbatch
      - name: Check README inventory
        run: python scripts/check_repo_inventory.py --readme README.md -o /tmp/repo_inventory.tsv
      - name: Validate toy FASTA
        run: python scripts/validate_fasta.py examples/toy/toy_assembly.fa --min-length 1
      - name: Validate toy AGP
        run: python scripts/validate_agp.py examples/toy/toy.agp
      - name: Audit toy FASTA headers
        run: python scripts/audit_fasta_headers.py examples/toy/toy_assembly.fa -o /tmp/toy_header_audit.tsv
      - name: Audit toy annotation IDs
        run: python scripts/audit_gff3_fasta_ids.py --fasta examples/annotation_validation/toy_genome.fsa --gff3 examples/annotation_validation/toy_annotation.gff3 -o /tmp/toy_annotation_id_audit.tsv
      - name: Split toy FASTA at curated breakpoints
        run: python scripts/split_fasta_at_breaks.py --fasta examples/toy/toy_assembly.fa --breaks examples/toy/toy_breaks.tsv -o /tmp/toy_split.fa --map /tmp/toy_split.map.tsv
      - name: Validate split toy FASTA
        run: python scripts/validate_fasta.py /tmp/toy_split.fa --min-length 1 -o /tmp/toy_split_validation.tsv
      - name: Validate toy breakpoints
        run: python scripts/validate_breaks.py --fasta examples/toy/toy_assembly.fa --breaks examples/toy/toy_breaks.tsv -o /tmp/toy_breaks_validation.tsv
      - name: Summarize toy corrections
        run: python scripts/summarize_corrections.py --split-map /tmp/toy_split.map.tsv --decision-log examples/toy/toy_correction_decisions.tsv -o /tmp/toy_correction_summary.tsv --markdown /tmp/toy_correction_summary.md
      - name: Audit toy correction decisions
        run: python scripts/audit_correction_decisions.py examples/toy/toy_correction_decisions.tsv -o /tmp/toy_correction_decision_audit.tsv
      - name: Compare toy FASTA stats
        run: python scripts/compare_fasta_stats.py --before examples/toy/toy_assembly.fa --after /tmp/toy_split.fa -o /tmp/toy_fasta_comparison.tsv
      - name: Summarize toy FASTA gaps
        run: python scripts/summarize_fasta_gaps.py examples/toy/toy_assembly.fa -o /tmp/toy_gaps.tsv --summary /tmp/toy_gap_summary.tsv
      - name: Build toy gap filling report
        run: python scripts/make_gap_filling_report.py --before examples/toy/toy_assembly.fa --after examples/toy/toy_gapfilled.fa --decision-log examples/gap_filling_decisions.tsv --sample toy --version 0.5.0-dev -o /tmp/toy_gap_filling_report.tsv --markdown /tmp/toy_gap_filling_report.md
      - name: Build toy correction report
        run: python scripts/make_correction_report.py --sample toy --version 0.5.0-dev --decision-log examples/toy/toy_correction_decisions.tsv --decision-audit /tmp/toy_correction_decision_audit.tsv --correction-summary /tmp/toy_correction_summary.tsv --split-map /tmp/toy_split.map.tsv --fasta-comparison /tmp/toy_fasta_comparison.tsv --break-validation /tmp/toy_breaks_validation.tsv --fasta-validation /tmp/toy_split_validation.tsv -o /tmp/toy_post_correction_report.md
      - name: Audit example release manifest
        run: python scripts/audit_release_manifest.py examples/release_manifest.tsv -o /tmp/manifest_audit.tsv
      - name: Build toy dashboard
        run: |
          python scripts/collect_qc_dashboard.py \
            --telomere-summary examples/telomere_summary.tsv \
            --repeat-summary examples/repeat_summary.tsv \
            --annotation-summary examples/annotation_summary.tsv \
            -o /tmp/assembly_qc_dashboard.tsv
      - name: Summarize toy organelle PAF
        run: |
          printf 'unplaced_000001\t47\t0\t42\t+\tchloroplast_ref\t150000\t10\t52\t42\t42\t60\n' > /tmp/toy_organelle.paf
          python scripts/summarize_organelle_hits.py /tmp/toy_organelle.paf -o /tmp/toy_organelle_summary.tsv
