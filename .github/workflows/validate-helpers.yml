name: validate-helpers

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python helpers
        run: python -m py_compile scripts/*.py
      - name: Validate sbatch shell syntax
        run: bash -n 01_sbatch_templates/*.sbatch
      - name: Check README inventory
        run: python scripts/check_repo_inventory.py --readme README.md -o /tmp/repo_inventory.tsv
      - name: Check project metadata
        run: python scripts/check_project_metadata.py -o /tmp/project_metadata.tsv
      - name: Check public release metadata
        run: python scripts/check_public_release_metadata.py -o /tmp/public_release_metadata.tsv
      - name: Check local Markdown links
        run: python scripts/check_markdown_links.py README.md docs -o /tmp/markdown_links.tsv
      - name: Check README step docs coverage
        run: python scripts/check_docs_coverage.py -o /tmp/docs_coverage.tsv
      - name: Confirm Markdown link checker scanned links
        run: test "$(tail -n +2 /tmp/markdown_links.tsv | wc -l)" -gt 0
      - name: Confirm Markdown link checker fails broken links
        run: |
          printf '[broken](missing-page.md)\n' > /tmp/broken_link_fixture.md
          if python scripts/check_markdown_links.py /tmp/broken_link_fixture.md -o /tmp/broken_markdown_links.tsv; then
            echo "expected broken Markdown link check to fail"
            exit 1
          fi
      - name: Validate toy FASTA
        run: python scripts/validate_fasta.py examples/toy/toy_assembly.fa --min-length 1
      - name: Validate toy AGP
        run: python scripts/validate_agp.py examples/toy/toy.agp
      - name: Summarize toy AGP
        run: python scripts/summarize_agp.py examples/toy/toy.agp -o /tmp/toy_agp_summary.tsv
      - name: Audit toy FASTA headers
        run: python scripts/audit_fasta_headers.py examples/toy/toy_assembly.fa -o /tmp/toy_header_audit.tsv
      - name: Audit toy annotation IDs
        run: python scripts/audit_gff3_fasta_ids.py --fasta examples/annotation_validation/toy_genome.fsa --gff3 examples/annotation_validation/toy_annotation.gff3 -o /tmp/toy_annotation_id_audit.tsv
      - name: Split toy FASTA at curated breakpoints
        run: python scripts/split_fasta_at_breaks.py --fasta examples/toy/toy_assembly.fa --breaks examples/toy/toy_breaks.tsv -o /tmp/toy_split.fa --map /tmp/toy_split.map.tsv
      - name: Validate split toy FASTA
        run: python scripts/validate_fasta.py /tmp/toy_split.fa --min-length 1 -o /tmp/toy_split_validation.tsv
      - name: Validate toy breakpoints
        run: python scripts/validate_breaks.py --fasta examples/toy/toy_assembly.fa --breaks examples/toy/toy_breaks.tsv -o /tmp/toy_breaks_validation.tsv
      - name: Summarize toy corrections
        run: python scripts/summarize_corrections.py --split-map /tmp/toy_split.map.tsv --decision-log examples/toy/toy_correction_decisions.tsv -o /tmp/toy_correction_summary.tsv --markdown /tmp/toy_correction_summary.md
      - name: Audit toy correction decisions
        run: python scripts/audit_correction_decisions.py examples/toy/toy_correction_decisions.tsv -o /tmp/toy_correction_decision_audit.tsv
      - name: Compare toy FASTA stats
        run: python scripts/compare_fasta_stats.py --before examples/toy/toy_assembly.fa --after /tmp/toy_split.fa -o /tmp/toy_fasta_comparison.tsv
      - name: Summarize toy FASTA gaps
        run: python scripts/summarize_fasta_gaps.py examples/toy/toy_assembly.fa -o /tmp/toy_gaps.tsv --summary /tmp/toy_gap_summary.tsv
      - name: Build toy gap filling report
        run: python scripts/make_gap_filling_report.py --before examples/toy/toy_assembly.fa --after examples/toy/toy_gapfilled.fa --decision-log examples/gap_filling_decisions.tsv --sample toy --version 0.5.0-dev -o /tmp/toy_gap_filling_report.tsv --markdown /tmp/toy_gap_filling_report.md
      - name: Compare toy scaffolding candidates
        run: python scripts/compare_scaffolding_candidates.py --candidate draft=examples/toy/toy_assembly.fa --candidate gapfilled=examples/toy/toy_gapfilled.fa -o /tmp/toy_scaffolding_candidates.tsv
      - name: Summarize toy telomeres
        run: python scripts/summarize_telomeres.py examples/toy/toy_assembly.fa --motif TTTAGGG --window 30 --min-hits 2 -o /tmp/toy_telomere_summary.tsv
      - name: Build toy T2T readiness report
        run: python scripts/make_t2t_readiness_report.py --fasta examples/toy/toy_assembly.fa --telomere-summary /tmp/toy_telomere_summary.tsv --centromere-table examples/centromere_candidates.tsv --sample toy --version 0.5.0-dev -o /tmp/toy_t2t_readiness.tsv --markdown /tmp/toy_t2t_readiness.md
      - name: Build toy T2T readiness report without centromere support
        run: python scripts/make_t2t_readiness_report.py --fasta examples/toy/toy_gapfilled.fa --telomere-summary /tmp/toy_telomere_summary.tsv --centromere-table examples/centromere_candidates_empty.tsv --sample toy_no_centromere --version 0.5.0-dev -o /tmp/toy_t2t_readiness_no_centromere.tsv
      - name: Audit T2T completeness evidence table
        run: python scripts/audit_t2t_evidence_package.py examples/t2t_completeness_evidence.tsv -o /tmp/t2t_evidence_audit.tsv
      - name: Confirm T2T completeness audit catches overclaims
        run: |
          if python scripts/audit_t2t_evidence_package.py examples/t2t_completeness_evidence_bad.tsv -o /tmp/t2t_bad_evidence_audit.tsv; then
            echo "expected T2T evidence audit to fail overclaimed candidate T2T row"
            exit 1
          fi
      - name: Build toy correction report
        run: python scripts/make_correction_report.py --sample toy --version 0.5.0-dev --decision-log examples/toy/toy_correction_decisions.tsv --decision-audit /tmp/toy_correction_decision_audit.tsv --correction-summary /tmp/toy_correction_summary.tsv --split-map /tmp/toy_split.map.tsv --fasta-comparison /tmp/toy_fasta_comparison.tsv --break-validation /tmp/toy_breaks_validation.tsv --fasta-validation /tmp/toy_split_validation.tsv -o /tmp/toy_post_correction_report.md
      - name: Audit example release manifest
        run: python scripts/audit_release_manifest.py examples/release_manifest.tsv -o /tmp/manifest_audit.tsv
      - name: Build toy dashboard
        run: |
          python scripts/collect_qc_dashboard.py \
            --telomere-summary examples/telomere_summary.tsv \
            --repeat-summary examples/repeat_summary.tsv \
            --annotation-summary examples/annotation_summary.tsv \
            -o /tmp/assembly_qc_dashboard.tsv
      - name: Compare repeat summary candidates
        run: python scripts/compare_repeat_summaries.py --candidate edta=examples/repeat_summary_edta.tsv --candidate repeatmodeler=examples/repeat_summary_repeatmodeler.tsv -o /tmp/repeat_summary_comparison.tsv
      - name: Audit repeat annotation decision table
        run: python scripts/audit_repeat_annotation_decisions.py examples/repeat_annotation_decisions.tsv -o /tmp/repeat_annotation_decision_audit.tsv
      - name: Confirm repeat annotation decision audit catches contradictions
        run: |
          if python scripts/audit_repeat_annotation_decisions.py examples/repeat_annotation_decisions_bad.tsv -o /tmp/repeat_annotation_decision_bad_audit.tsv; then
            echo "expected repeat annotation decision audit to fail contradictory release choices"
            exit 1
          fi
      - name: Compare annotation summary candidates
        run: python scripts/compare_annotation_summaries.py --candidate liftoff=examples/annotation_summary_liftoff.tsv --candidate hybrid=examples/annotation_summary_hybrid.tsv -o /tmp/annotation_summary_comparison.tsv
      - name: Audit gene annotation decision table
        run: python scripts/audit_gene_annotation_decisions.py examples/gene_annotation_decisions.tsv -o /tmp/gene_annotation_decision_audit.tsv
      - name: Confirm gene annotation decision audit catches contradictions
        run: |
          if python scripts/audit_gene_annotation_decisions.py examples/gene_annotation_decisions_bad.tsv -o /tmp/gene_annotation_decision_bad_audit.tsv; then
            echo "expected gene annotation decision audit to fail contradictory release choices"
            exit 1
          fi
      - name: Audit release submission decision table
        run: python scripts/audit_release_submission_decisions.py examples/release_submission_decisions.tsv -o /tmp/release_submission_decision_audit.tsv
      - name: Confirm release submission decision audit catches contradictions
        run: |
          if python scripts/audit_release_submission_decisions.py examples/release_submission_decisions_bad.tsv -o /tmp/release_submission_decision_bad_audit.tsv; then
            echo "expected release submission decision audit to fail incomplete release package choices"
            exit 1
          fi
      - name: Summarize toy organelle PAF
        run: |
          printf 'unplaced_000001\t47\t0\t42\t+\tchloroplast_ref\t150000\t10\t52\t42\t42\t60\n' > /tmp/toy_organelle.paf
          python scripts/summarize_organelle_hits.py /tmp/toy_organelle.paf -o /tmp/toy_organelle_summary.tsv
